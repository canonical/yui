name: Publish

on:
    release:
        types: [published]
    workflow_dispatch:

permissions: {}

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write # required for npm OIDC trusted publishing
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 26
                  registry-url: https://registry.npmjs.org
            - name: Install dependencies
              run: npm ci --no-audit --no-fund
            - name: Run unit/node tests
              run: npm test
            - name: Ensure npm supports trusted publishing
              run: npm install -g npm@latest
            - name: Stage flattened package (build output at root)
              run: npm run stage-npm
            - name: Publish to npm (OIDC trusted publishing)
              # Publishes the staged npm-dist whose root mirrors the legacy `yui`
              # layout (modules at the tarball root, no build/ prefix).
              run: npm publish ./npm-dist
