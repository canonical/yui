name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions: {}

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        strategy:
            matrix:
                node-version: [18, 20, 26]
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false
            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: ${{ matrix.node-version }}
            - name: Install dependencies
              run: npm install --no-audit --no-fund
            - name: Run unit/node tests
              run: npm test

    browser:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 26
            - run: npm install --no-audit --no-fund
            - name: Cache Playwright browsers
              id: playwright-cache
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
            - name: Install Playwright Chromium (cache miss)
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: npx playwright install --with-deps chromium
            - name: Install Playwright system deps (cache hit)
              if: steps.playwright-cache.outputs.cache-hit == 'true'
              run: npx playwright install-deps chromium
            - name: Run browser tests
              run: npm run test:browser
            - name: Run legacy YUITest harnesses
              run: npm run test:legacy

    audit:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 26
            - run: npm install --no-fund
            - name: Audit production dependencies
              run: npm audit --omit=dev || true

    freeze:
        # Legacy upstream YUITest harnesses are frozen reference. Fail PRs that
        # touch them so the originals stay unmodified (see AGENTS.md).
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 0
                  persist-credentials: false
            - name: Reject changes under src/**/tests
              env:
                  BASE_REF: ${{ github.base_ref }}
              run: |
                  changed=$(git diff --name-only "origin/${BASE_REF}...HEAD" -- 'src/**/tests/**')
                  if [ -n "$changed" ]; then
                    echo "Legacy harnesses are frozen; reverting required:"; echo "$changed"; exit 1
                  fi
